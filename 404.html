<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <!-- Fixed the library URL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: #f4f4f9; /* Soft background for contrast */
        }
        #qrcode {
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #qrcode img { 
            display: block;
            max-width: 100%;
            height: auto; 
        }
    </style>
</head>
<body>
    <div id="qrcode"></div>

    <script>
        function render() {
            const params = new URLSearchParams(window.location.search);
            let data = params.get('qr');

            // Fallback for /qr= path-style triggers
            if (!data && window.location.href.includes('qr=')) {
                data = window.location.href.split('qr=').pop();
            }

            if (data) {
                new QRCode(document.getElementById("qrcode"), {
                    text: decodeURIComponent(data),
                    width: 512,
                    height: 512,
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else {
                document.getElementById("qrcode").innerText = "No data provided.";
            }
        }

        // Initialize once DOM is ready
        window.addEventListener('load', render);
    </script>
</body>
</html>
